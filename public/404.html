<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#05070D" />
<title>404 — Страница не найдена | GPTBot</title>
<meta name="description" content="Запрошенная страница не существует на gptbot.uz." />
<link rel="icon" type="image/png" href="/assets/landing/2.png" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#05070D;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100%}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;line-height:1.5}
  .box{max-width:560px;text-align:center}
  .code{font-size:88px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(90deg,#22d3ee,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 8px}
  h1{font-size:28px;margin:0 0 12px;font-weight:700}
  p{color:rgba(255,255,255,.7);margin:0 0 24px}
  a{display:inline-block;background:linear-gradient(90deg,#22d3ee,#a78bfa);color:#05070D;text-decoration:none;font-weight:600;padding:14px 28px;border-radius:9999px}
  a:hover{transform:scale(1.03)}
</style>
</head>
<body>
  <div class="box" data-testid="page-404">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, она была перемещена или больше не существует. Вернитесь на главную или откройте Telegram-бота GPTBot.</p>
    <a href="/" data-testid="page-404-home">На главную</a>
  </div>
</body>
</html>
