# wrangler config for Cloudflare Pages (`ai-direct-pro-landing`).
#
# This file is consumed by `wrangler pages dev` for local development and by
# the deploy command for reference. The authoritative production bindings
# are configured in the Cloudflare dashboard / via the Pages REST API and
# always win at runtime.
#
# Bindings:
#   GPTBOT_DRAFTS_DB  → D1 database "gptbot-ai-drafts" (AI Draft Inbox).
#   LOGIN_ATTEMPTS    → KV namespace for the existing login-lockout subsystem.
#
# Secrets (NEVER committed; configured in Cloudflare Pages → Settings → Env vars):
#   N8N_INGEST_TOKEN, JWT_SECRET, GITHUB_TOKEN, ADMIN_PASSWORD_HASH,
#   OPENROUTER_API_KEY, SERPER_API_KEY, TELEGRAM_*.

name = "ai-direct-pro-landing"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "GPTBOT_DRAFTS_DB"
database_name = "gptbot-ai-drafts"
database_id = "97ef0372-d937-406f-8871-755368d9afff"

# Workers AI binding (Cloudflare Pages Functions).
# Powers the direct-AI SEO Autopilot generator. The binding name "AI"
# is referenced via env.AI.run(model, …) in
# functions/lib/seo-autopilot/direct-generator.ts.
[ai]
binding = "AI"
